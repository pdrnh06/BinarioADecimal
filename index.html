<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0">
    <title>Conversor de binario a decimal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layoutPrincipal">

        <div class="carta">

            <div>
                <h1>Conversor de binario a decimal</h1>

                </form>
            </div>

            <div id="contenedor_resultado">

                <p id="parrafo_resultado"></p>
            </div>

        </div>

        

    </div>
    
    <script src="app.js" defer></script>

</html>
